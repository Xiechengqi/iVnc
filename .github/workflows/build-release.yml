name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            docker_platform: linux/amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binary in Docker container
        run: |
          cat > docker-build.sh << 'BUILDSCRIPT'
          #!/bin/bash
          set -euo pipefail

          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            ca-certificates \
            cmake \
            gnupg \
            libxcb1-dev \
            libxkbcommon-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpulse-dev \
            libopus-dev \
            libwayland-dev \
            libpixman-1-dev \
            libinput-dev \
            libudev-dev \
            libseat-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.88.0
          source "$HOME/.cargo/env"

          cd /workspace
          cd web/ivnc
          npm ci
          npm run build
          cd /workspace
          cargo build --release --features mcp --bin ivnc
          cp target/release/ivnc /output/ivnc-linux-$ARCH
          BUILDSCRIPT

          chmod +x docker-build.sh
          mkdir -p output

          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -v "$(pwd):/workspace" \
            -v "$(pwd)/output:/output" \
            -v "$(pwd)/docker-build.sh:/docker-build.sh" \
            -e ARCH=${{ matrix.arch }} \
            ubuntu:22.04 \
            /bin/bash /docker-build.sh

      - name: Verify binary
        run: |
          ls -lh output/
          file output/ivnc-linux-${{ matrix.arch }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ivnc-${{ matrix.arch }}
          path: output/ivnc-linux-${{ matrix.arch }}

  docker:
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs:
      - build
      - docker
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/ivnc-amd64/ivnc-linux-amd64 release-files/ || true
          chmod +x release-files/* || true
          echo "Release files:"
          ls -lh release-files/

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current version: v${VERSION}"

      - name: Compute image name
        id: image
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Delete existing latest release and tag
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.version.outputs.version }})"
          body: |
            ## 最新自动构建版本

            **版本**: ${{ steps.version.outputs.version }}
            **提交**: ${{ github.sha }}
            **分支**: ${{ github.ref_name }}

            ### 下载

            | 架构 | 文件名 |
            |------|--------|
            | AMD64 | `ivnc-linux-amd64` |

            ### Docker 镜像

            ```bash
            docker pull ${{ steps.image.outputs.name }}:latest
            ```

            ### 运行时依赖

            Docker 镜像已经包含 iVnc 所需运行时依赖。
          files: release-files/*
          prerelease: false
          draft: false

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>iVnc 控制台</title>
    <link rel="stylesheet" href="./console.css">
</head>
<body>
    <div class="page-header">
        <h1>iVnc 控制台</h1>
        <div class="toolbar">
            <button class="btn btn-add">+ 添加应用</button>
        </div>
    </div>
    
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>名称</th>
                    <th>类型</th>
                    <th>配置</th>
                    <th>状态</th>
                    <th>数据</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="app-list">
                <tr><td colspan="6" class="empty">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 模态框：添加/编辑 -->
    <div class="modal-bg" id="modal">
        <div class="modal">
            <h2 id="modal-title">添加应用</h2>
            <div class="form-group">
                <label>名称</label>
                <input type="text" id="f-name" placeholder="应用显示名称">
            </div>
            <div class="form-group">
                <label>应用类型</label>
                <select id="f-app-type">
                    <option value="webapp">网页APP</option>
                    <option value="desktop">桌面APP</option>
                </select>
            </div>

            <div class="form-group checkbox-row">
                <input type="checkbox" id="f-autostart">
                <label for="f-autostart">开机启动</label>
            </div>
            
            <div id="webapp-config">
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label>URL</label>
                        <input type="text" id="f-url" placeholder="https://">
                    </div>
                    <div class="form-group">
                        <label>模式</label>
                        <select id="f-mode">
                            <option value="native">Native</option>
                            <option value="webview">WebView</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" id="nav-row" style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="f-nav" style="width:auto; margin:0;">
                    <label for="f-nav" style="margin:0; font-weight: 500;">显示导航栏（仅 Native 模式）</label>
                </div>

                <div id="advanced-settings-group">
                    <div class="advanced-title">高级配置</div>
                    <div class="form-row">
                        <div class="form-group" id="debug-port-row">
                            <label>Debugging Port</label>
                            <input type="number" id="f-debug-port" placeholder="可选" min="1024" max="65535">
                        </div>
                        <div class="form-group" id="proxy-server-row">
                            <label>Proxy Server</label>
                            <input type="text" id="f-proxy-server" placeholder="socks5://127.0.0.1:1080">
                        </div>
                    </div>
                    <small class="help-text" id="proxy-help">清空则不使用代理</small>
                </div>
            </div>

            <div id="desktop-config" style="display:none">
                <div class="form-group">
                    <label>启动命令</label>
                    <input type="text" id="f-exec" placeholder="/usr/bin/code --no-sandbox">
                </div>
                <div class="form-group">
                    <label>环境变量（可选）</label>
                    <textarea id="f-env" rows="3" placeholder="KEY1=value1&#10;KEY2=value2"></textarea>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel">取消</button>
                <button class="btn btn-save" id="modal-save">保存</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 模态框：日志 -->
    <div class="modal-bg" id="log-modal">
        <div class="modal log-modal">
            <h2 id="log-title">应用日志</h2>
            <div class="log-content" id="log-content">(loading...)</div>
            <div class="modal-actions">
                <button class="btn btn-cancel">关闭</button>
            </div>
        </div>
    </div>

    <script type="module" src="./console.js"></script>
</body>
</html>
